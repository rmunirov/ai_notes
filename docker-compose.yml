services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ai_notes
      POSTGRES_PASSWORD: ai_notes
      POSTGRES_DB: ai_notes
    ports:
      # 5432 часто занят локальным PostgreSQL — наружу 5433
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_notes -d ai_notes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
